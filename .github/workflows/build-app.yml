name: Build App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (optional)'
        required: false
        default: '1'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      - name: 📝 Create Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 🤖 Build Android APK
        run: flutter build apk --release --build-number=${{ github.event.inputs.build_number || github.run_number }}

      - name: 🤖 Build Android App Bundle
        run: flutter build appbundle --release --build-number=${{ github.event.inputs.build_number || github.run_number }}

      - name: 📤 Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: 📊 Android Build Summary
        run: |
          echo "## ✅ Android Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          AAB_SIZE=$(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)
          echo "- **APK**: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **App Bundle**: $AAB_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Installation" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`android-apk\` from Artifacts below" >> $GITHUB_STEP_SUMMARY
          echo "2. Enable 'Unknown Sources' on your device" >> $GITHUB_STEP_SUMMARY
          echo "3. Install the APK" >> $GITHUB_STEP_SUMMARY

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-android  # 等待Android构建完成
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🍎 Check iOS project
        id: check_ios
        run: |
          if [ -f "ios/Podfile" ] && [ -d "ios/Runner.xcodeproj" ]; then
            echo "ios_ready=true" >> $GITHUB_OUTPUT
            echo "✅ iOS project files found"
          else
            echo "ios_ready=false" >> $GITHUB_OUTPUT
            echo "⚠️ iOS project files not found, will create them"
          fi

      - name: 🍎 Create iOS project if needed
        if: steps.check_ios.outputs.ios_ready == 'false'
        run: |
          echo "Creating iOS project..."
          flutter create --platforms=ios .
          echo "✅ iOS project created"

      - name: 🍎 Install CocoaPods dependencies
        run: |
          cd ios
          pod install || pod install --repo-update
          cd ..

      - name: 🍎 Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign --build-number=${{ github.event.inputs.build_number || github.run_number }}

      - name: 📦 Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../app-unsigned.ipa Payload
          cd ../../..
          echo "✅ IPA created: app-unsigned.ipa"

      - name: 📤 Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app-unsigned.ipa
          retention-days: 30

      - name: 📊 iOS Build Summary
        run: |
          echo "## ✅ iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IPA_SIZE=$(du -h app-unsigned.ipa | cut -f1)
          echo "- **IPA**: $IPA_SIZE (Unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Installation" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`ios-ipa-unsigned\` from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Use AltStore, Sideloadly, or Xcode to sign and install" >> $GITHUB_STEP_SUMMARY
          echo "3. See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md) for details" >> $GITHUB_STEP_SUMMARY
