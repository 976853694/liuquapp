name: Build Flutter App (With Signing)

# 这个工作流支持使用自签名证书或GitHub Secrets中的证书
# 需要在GitHub仓库设置中配置以下Secrets（可选）：
# - IOS_CERTIFICATE_BASE64: iOS证书的Base64编码
# - IOS_CERTIFICATE_PASSWORD: 证书密码
# - IOS_PROVISIONING_PROFILE_BASE64: 配置文件的Base64编码
# - ANDROID_KEYSTORE_BASE64: Android密钥库的Base64编码
# - ANDROID_KEYSTORE_PASSWORD: 密钥库密码
# - ANDROID_KEY_ALIAS: 密钥别名
# - ANDROID_KEY_PASSWORD: 密钥密码

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: false
        default: '1'
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

jobs:
  build-android-signed:
    name: Build Android (Signed)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Create keystore directory
        run: mkdir -p android/app/keystore

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.keystore

      - name: Create key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore/release.keystore
          EOF

      - name: Build signed APK
        run: flutter build apk --release --build-number=${{ github.event.inputs.build_number }}

      - name: Build signed App Bundle
        run: flutter build appbundle --release --build-number=${{ github.event.inputs.build_number }}

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-signed
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload signed App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle-signed
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios-signed:
    name: Build iOS (Signed)
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup certificates
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
        run: |
          # 创建临时keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # 导入证书
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          
          # 安装provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS
        run: |
          if [ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]; then
            flutter build ios --release --build-number=${{ github.event.inputs.build_number }}
          else
            flutter build ios --release --no-codesign --build-number=${{ github.event.inputs.build_number }}
          fi

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app-release.ipa Payload
          mv app-release.ipa ../../..

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-release
          path: app-release.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
