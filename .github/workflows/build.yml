name: Build Flutter App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Check iOS project
        id: check_ios
        run: |
          if [ -d "ios" ]; then
            echo "ios_exists=true" >> $GITHUB_OUTPUT
          else
            echo "ios_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS (No Codesign)
        if: steps.check_ios.outputs.ios_exists == 'true'
        run: |
          flutter build ios --release --no-codesign
        continue-on-error: true

      - name: Create IPA (Unsigned)
        if: steps.check_ios.outputs.ios_exists == 'true'
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -r app-unsigned.ipa Payload
            mv app-unsigned.ipa ../../..
            echo "IPA created successfully"
          else
            echo "Runner.app not found, skipping IPA creation"
          fi
        continue-on-error: true

      - name: Check if IPA exists
        id: check_ipa
        run: |
          if [ -f "app-unsigned.ipa" ]; then
            echo "ipa_exists=true" >> $GITHUB_OUTPUT
          else
            echo "ipa_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS IPA
        if: steps.check_ipa.outputs.ipa_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: app-unsigned.ipa
          retention-days: 30
        continue-on-error: true

      - name: Check if Runner.app exists
        id: check_app
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "app_exists=true" >> $GITHUB_OUTPUT
          else
            echo "app_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS App
        if: steps.check_app.outputs.app_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
        continue-on-error: true

      - name: iOS Build Summary
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "app-unsigned.ipa" ]; then
            echo "✅ IPA created successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ IPA creation failed or skipped" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ Runner.app created successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Runner.app creation failed or skipped" >> $GITHUB_STEP_SUMMARY
          fi

  build-info:
    name: Build Information
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always()
    
    steps:
      - name: Create build info
        run: |
          echo "# Build Information" > build-info.md
          echo "" >> build-info.md
          echo "**Build Date:** $(date)" >> build-info.md
          echo "**Commit:** ${{ github.sha }}" >> build-info.md
          echo "**Branch:** ${{ github.ref_name }}" >> build-info.md
          echo "" >> build-info.md
          echo "## Build Status" >> build-info.md
          echo "- Android: ${{ needs.build-android.result }}" >> build-info.md
          echo "- iOS: ${{ needs.build-ios.result }}" >> build-info.md
          echo "" >> build-info.md
          echo "## Artifacts" >> build-info.md
          echo "- Android APK: Ready for installation" >> build-info.md
          echo "- Android App Bundle: For Google Play Store" >> build-info.md
          echo "- iOS IPA (Unsigned): May require manual signing (if available)" >> build-info.md
          echo "" >> build-info.md
          echo "## Installation Instructions" >> build-info.md
          echo "" >> build-info.md
          echo "### Android" >> build-info.md
          echo "1. Download the APK file" >> build-info.md
          echo "2. Enable 'Install from Unknown Sources' in Settings" >> build-info.md
          echo "3. Install the APK" >> build-info.md
          echo "" >> build-info.md
          echo "### iOS" >> build-info.md
          echo "1. Download the unsigned IPA (if available)" >> build-info.md
          echo "2. Use tools like AltStore, Sideloadly, or Xcode to sign and install" >> build-info.md
          echo "3. Or use a jailbroken device with AppSync Unified" >> build-info.md
          echo "" >> build-info.md
          echo "## Notes" >> build-info.md
          echo "- iOS builds may fail on GitHub Actions due to missing iOS project files" >> build-info.md
          echo "- Android APK is the primary deliverable and should always be available" >> build-info.md
          echo "- For iOS development, build locally on macOS" >> build-info.md

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.md
          retention-days: 30
